services:
  postgres:
    image: postgres:example
    container_name: name_example
    restart: always

    volumes:
      - postgres_data_example:/var/lib/postgresql/data

    environment:
      POSTGRES_USER: user_example
      POSTGRES_PASSWORD: password_example
      POSTGRES_DB: database_example

    ports:
      - "5438:5432"
      
volumes:
  postgres_data_example: 
